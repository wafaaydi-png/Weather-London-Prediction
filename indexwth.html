<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prédiction Température Londres</title>
       <style>
.description{
    text-align: center;
    color: white;
    font-size: 16px;
    margin-bottom: 20px;
}
</style>


    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            padding:0;
            background-image: url("https://wallpaperaccess.com/full/11748762.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }

        .container{
            width: 600px;
            margin: 30px auto;
            padding: 25px;
            background: rgba(0, 0, 100, 0.75);
            border-radius: 15px;
            color: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h1{
            text-align:center;
            color:#87CEFA;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            margin-top:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#1E90FF;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#4682B4;
        }

        .resultat{
            margin-top:20px;
            padding:15px;
            background:rgba(255,255,255,0.2);
            border-radius:10px;
            text-align:center;
            font-size:22px;
            color:yellow;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Prédiction Température de Londres</h1>
    <p class="description">
    Veuillez entrer les données climatiques pour obtenir la prédiction de la température.
</p>

    <form method="POST">

    <label>Couverture nuageuse</label>
    <input type="number" step="any" name="cloud_cover" placeholder="Ex : 5.2" required>

    <label>Ensoleillement</label>
    <input type="number" step="any" name="sunshine" placeholder="Ex : 7.8" required>

    <label>Rayonnement global</label>
    <input type="number" step="any" name="global_radiation" placeholder="Ex : 120.5" required>

    <label>Température maximale</label>
    <input type="number" step="any" name="max_temp" placeholder="Ex : 18.6" required>

    <label>Température minimale</label>
    <input type="number" step="any" name="min_temp" placeholder="Ex : 9.3" required>

    <label>Précipitations</label>
    <input type="number" step="any" name="precipitation" placeholder="Ex : 2.4" required>

    <label>Pression atmosphérique</label>
    <input type="number" step="any" name="pressure" placeholder="Ex : 1015" required>

    <label>Profondeur de neige</label>
    <input type="number" step="any" name="snow_depth" placeholder="Ex : 0" required>

    <label>Année</label>
    <input type="number" name="year" placeholder="Ex : 2024" required>

    <label>Mois</label>
    <input type="number" name="month" placeholder="Ex : 5" required>

    <label>Jour</label>
    <input type="number" name="day" placeholder="Ex : 10" required>

    <button type="submit">Prédire</button>

</form>

    {% if prediction %}
    <div class="resultat">
        Température prédite : {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
